name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  package-library:
    name: Package Glyph Lua Library
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build library archive
        id: package
        shell: bash
        run: |
          set -euo pipefail

          safe_tag="$(printf '%s' "$GITHUB_REF_NAME" | tr '/[:space:]' '-' | tr -cd 'A-Za-z0-9._-')"
          if [[ -z "$safe_tag" ]]; then
            safe_tag="${GITHUB_SHA::12}"
          fi
          package_name="glyph.lua-${safe_tag}"
          staging_dir="dist/${package_name}"
          archive_path="dist/${package_name}.zip"

          mkdir -p "$staging_dir"
          cp glyph.lua "$staging_dir/glyph.lua"
          cp -R glyph "$staging_dir/glyph"

          for file in README.md glyph-dev-1.rockspec LICENSE LICENSE.md COPYING COPYING.md; do
            if [[ -f "$file" ]]; then
              cp "$file" "$staging_dir/"
            fi
          done

          (cd dist && zip -r -q "${package_name}.zip" "$package_name")
          unzip -l "$archive_path"

          echo "archive_path=${archive_path}" >> "$GITHUB_OUTPUT"

      - name: Upload archive to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.package.outputs.archive_path }}
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
